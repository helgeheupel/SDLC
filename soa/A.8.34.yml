control-name: "Protection of Information Systems During Audit Testing"
theme: technological
applicable: true
justification: >
  Applicable. During ISO 27001, ISO 42001, and TISAX audits, information
  systems must be protected from disruption caused by audit activities.
  Penetration testing performed by the IT Pentester/Super Admin is conducted in
  controlled environments. External auditor access is restricted to read-only
  evidence repositories. Formal audit testing protection procedures are planned
  for Phase 10 (audit readiness).
