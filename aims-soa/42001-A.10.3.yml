---
control-id: A.10.3
control-name: "Suppliers"
group: A.10
group-name: "Third-party and customer relationships"
group-objective: >
  To ensure appropriate management of AI-related responsibilities in
  third-party and customer relationships.
applicable: true
justification: >
  Applicable. The Helge Heupel Group relies on AI suppliers for core
  operations: Anthropic provides the Claude foundation model used by all 7
  agents, OpenAI provides ChatGPT and Codex, and Microsoft provides Azure
  OpenAI Service for Product AI. Supplier governance includes: evaluating
  AI provider practices (data handling, model safety, transparency),
  monitoring provider compliance with GPAI obligations, and ensuring
  contractual terms cover AI-specific requirements.
implementation-status: partially-implemented
implementation-approach: >
  AI supplier governance extends the existing supplier management framework:
  Anthropic (primary supplier for Development AI) is evaluated on model
  safety practices, data handling policies, and API reliability. OpenAI
  is evaluated for enterprise data handling, DPA availability, and model
  capabilities. Microsoft (Azure OpenAI Service) is evaluated under the
  existing Azure enterprise agreement with AI-specific addenda. Supplier
  evaluation criteria include: GPAI provider obligations under EU AI Act,
  data processing terms (GDPR compliance), model transparency documentation,
  incident notification commitments, and service level agreements. Formal
  AI supplier assessment framework is being developed per ISO 42001 Annex
  B.10.3 guidance.
