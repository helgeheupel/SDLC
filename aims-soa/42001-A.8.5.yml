---
control-id: A.8.5
control-name: "Information for interested parties"
group: A.8
group-name: "Information for interested parties of AI systems"
group-objective: >
  To ensure that interested parties of AI systems are informed about the
  AI system's capabilities, limitations, and intended use.
applicable: true
justification: >
  Applicable. Multiple interested parties require AI governance information:
  customers need transparency about Product AI capabilities and limitations;
  regulators need conformity evidence; auditors need AIMS documentation;
  employees need AI literacy and acceptable use guidance; suppliers need
  AI requirement specifications. The AI Policy and AI System Registry serve
  as primary information sources for interested parties.
implementation-status: partially-implemented
implementation-approach: >
  Information is provided to interested parties through multiple channels:
  auditors receive the AIMS SoA, AI System Registry summary, and PDCA
  evidence. Customers receive Product AI documentation (capability
  descriptions, limitations, "AI-assisted" indicators) integrated into
  product UI and documentation. Regulators receive conformity evidence
  packages assembled per EU AI Act requirements. Team members receive
  AI Policy, acceptable use guidelines, and AI literacy training materials.
  Business partners (BearingPoint, NorthGRC) receive AI governance posture
  summaries as part of collaboration. Information provision is proportionate
  to the interested party's role and legitimate interest.
