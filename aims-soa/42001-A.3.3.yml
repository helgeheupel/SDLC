control-id: A.3.3
control-name: "Reporting of concerns"
group: A.3
group-name: "Internal organization"
group-objective: >
  To establish a framework for the implementation and operation of the AI
  management system within the organization.
applicable: true
justification: >
  Applicable. The Helge Heupel Group provides mechanisms for all personnel
  and AI agents to report AI-related concerns including bias detection,
  prohibited practice suspicion, safety issues, and ethical concerns. The
  AI Policy Section 5 defines violation response procedures. AI agents flag
  concerns using dependency tags ([CISO-DEPENDENCY], [CTO-DEPENDENCY]) and
  the PR review workflow ensures concerns are visible to all reviewers.
implementation-status: partially-implemented
implementation-approach: >
  AI concern reporting uses existing channels adapted for AI context: the
  AI Policy Section 5 requires immediate reporting of prohibited practice
  violations to CISO Agent and CEO. AI agents flag cross-domain concerns
  via dependency tags in their outputs. The PR workflow provides a visible
  audit trail for concerns raised during artifact review. At Startup, the
  small team size (6 people) enables direct reporting without a formal
  whistleblowing system. A structured AI concern reporting form is planned
  for the Growth phase when team size increases.
