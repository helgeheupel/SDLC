    relationship: "No direct ISO 27001 equivalent. AI impact assessment documentation is additive to the ISMS. While ISO 27001 cl. 7.5 governs documented information generally, the specific content of AI impact assessments (individual/societal impacts) has no ISO 27001 counterpart."
