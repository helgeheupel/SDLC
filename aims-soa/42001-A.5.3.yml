---
control-id: A.5.3
control-name: "Documentation of AI system impact assessments"
group: A.5
group-name: "Assessing impacts of AI systems"
group-objective: >
  To identify and assess the potential consequences of AI systems on
  individuals, groups of individuals, and societies.
applicable: true
justification: >
  Applicable. All AI impact assessments must be documented per ISO 42001
  Annex A.5.3 requirements. Documentation covers scope, methodology,
  findings, mitigations, residual impacts, and approval records. The
  AI impact assessment procedure defines the documentation template and
  retention requirements (minimum 7 years per data retention policy).
implementation-status: planned
implementation-approach: >
  Impact assessment documentation follows the AI Impact Assessment Procedure
  (HH-AIMS-AIA-001) template: system identification, assessment scope,
  affected stakeholders, impact dimensions with ratings, threshold
  comparison, mitigation actions, residual impact evaluation, and CEO
  approval block. Documentation is stored in Git with YAML frontmatter
  for document control. First impact assessments are scheduled for
  completion as part of AIMS certification readiness, starting with
  Product AI systems (Verity VE and EAM).
evidence-references:
  - document-id: HH-AIMS-AIA-001
