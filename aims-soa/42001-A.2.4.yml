group-name: "Policies related to AI"
group-objective: >
  To provide management direction and support for AI, in accordance with
  business requirements, relevant laws, regulations, and contracts.
applicable: true
justification: >
  Applicable. The AI Policy has a semi-annual review cycle (faster than the
  IS Policy annual cycle) reflecting the rapid evolution of AI regulation and
  technology. The next review date is 2026-08-19. Extraordinary review triggers
  are defined for new EU AI Act implementing acts, new High-Risk AI deployments,
  significant AI incidents, and ISO 42001 auditor findings.
implementation-status: fully-implemented
implementation-approach: >
  The AI Policy (HH-AIMS-POL-001) specifies a semi-annual review cycle in
  Section 9.2 with the next review date tracked in YAML frontmatter
  (next-review field). Six change triggers requiring extraordinary review are
  documented. The review process follows the document control framework:
  CISO Agent drafts changes, CTO and CISO review via PR, CEO approves via
  merge. The document register (HH-ISMS-REG-001) tracks review dates.
