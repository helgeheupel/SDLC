    relationship: "A.5.33 (Protection of records) ensures records integrity and availability; A.7.5 extends this to AI-specific data provenance tracking including source attribution, transformation history, and consent chains."
  - control-id: A.5.12
    relationship: "A.5.12 (Classification of information) tracks data classification; A.7.5 adds provenance metadata tracking the full lifecycle of data used in AI systems."
