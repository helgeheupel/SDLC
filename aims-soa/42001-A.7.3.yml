---
control-id: A.7.3
control-name: "Acquisition of data"
group: A.7
group-name: "Data for AI systems"
group-objective: >
  To ensure appropriate data management practices for AI systems, including
  data collection, processing, and usage throughout the AI system life cycle.
applicable: true
justification: >
  Applicable but with different scope per system category. For Development AI
  (agents), HH does not acquire training data as Anthropic provides the
  pre-trained model; however, context data (ISO standards, compliance
  documents) is acquired and managed. For Product AI (Verity VE/EAM),
  data acquisition includes customer project data (under DPA), industry
  benchmarks, and public datasets. Data acquisition controls are needed
  for both categories.
implementation-status: partially-implemented
implementation-approach: >
  Data acquisition controls vary by source: licensed ISO standards are
  procured through official channels with usage rights documented. Customer
  data for Product AI is acquired under executed DPAs with explicit consent
  for AI processing per AI Policy prohibition #13. Public datasets are
  assessed for licensing terms, data quality, and potential biases before
  use. Third-party AI providers (Anthropic, OpenAI, Azure) handle their
  own training data acquisition; HH assesses provider data practices as
  part of supplier evaluation. Data acquisition records are maintained
  for audit traceability.
