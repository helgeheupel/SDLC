---
control-id: A.10.4
control-name: "Customers"
group: A.10
group-name: "Third-party and customer relationships"
group-objective: >
  To ensure appropriate management of AI-related responsibilities in
  third-party and customer relationships.
applicable: true
justification: >
  Applicable. Verity VE and EAM products include AI features that serve
  enterprise customers. Customer relationships require: transparency about
  AI capabilities and limitations (EU AI Act Art. 50), DPAs for AI
  processing of customer data, documentation of AI feature intended use,
  and incident communication procedures. Even though Product AI is in
  development, customer governance framework must be established before
  first deployment.
implementation-status: planned
implementation-approach: >
  Customer governance for AI features is being established alongside Product
  AI development: customer-facing transparency information (capability
  descriptions, limitations, "AI-assisted" indicators) is designed per
  AI Policy Principle 2 and ISO 12792. Customer DPAs will include AI
  processing clauses covering: purpose limitation, data minimization,
  automated decision-making disclosure (GDPR Art. 22), and customer rights.
  Customer documentation includes AI feature user guides, accuracy
  disclaimers, and human oversight recommendations. AI incident
  communication procedures ensure customers are notified of issues
  affecting their data or decisions per defined timelines.
