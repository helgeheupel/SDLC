---
control-id: A.6.2.2
control-name: "AI system requirements and specification"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. Every AI system in the registry has documented requirements:
  intended-use, operational-context, EU AI Act classification, human oversight
  requirements, and data handling constraints. For Product AI, detailed
  functional and non-functional requirements are specified as part of the
  SDLC G1 gate. For agents, the agent prompt specification and reference
  materials define operational requirements.
implementation-status: partially-implemented
implementation-approach: >
  AI system requirements are documented at two levels: the AI System Registry
  entry captures high-level requirements (intended-use, classification,
  oversight level, data boundaries) for all 11 systems, and the SDLC process
  captures detailed specifications for systems under active development. Agent
  requirements are defined in agent prompt files (agents/*/AGENT.md) with
  reference materials. Product AI requirements follow G1 gate criteria in the
  SDLC-Growth-v2 framework. Third-party tool requirements are documented
  as acceptable use constraints per AI Policy Section 5.2.
