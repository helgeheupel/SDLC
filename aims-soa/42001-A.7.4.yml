---
control-id: A.7.4
control-name: "Quality of data for AI systems"
group: A.7
group-name: "Data for AI systems"
group-objective: >
  To ensure appropriate data management practices for AI systems, including
  data collection, processing, and usage throughout the AI system life cycle.
applicable: true
justification: >
  Applicable. Data quality directly affects AI system performance and
  fairness. For Product AI, data quality dimensions include accuracy,
  completeness, representativeness, timeliness, and consistency. Poor
  data quality in cost prediction models can lead to material errors in
  customer-facing recommendations. For Development AI, context data
  quality affects agent output accuracy and compliance artifact correctness.
implementation-status: planned
implementation-approach: >
  Data quality assessment is defined in the AI impact assessment procedure
  with specific quality dimensions: accuracy (verified against authoritative
  sources), completeness (coverage of required domains and demographics),
  representativeness (across target populations for bias prevention),
  timeliness (data currency relative to intended use), and consistency
  (format standardization). For Product AI, data quality gates are
  integrated into the SDLC at G1 (requirements include data quality
  criteria) and G3 (build includes data quality validation). For agents,
  context data quality is maintained through document control framework
  and regular review cycles. Quality metrics are reported in the Monthly
  Strategic meeting.
