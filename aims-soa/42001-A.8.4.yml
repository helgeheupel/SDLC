---
control-id: A.8.4
control-name: "Communication of incidents"
group: A.8
group-name: "Information for interested parties of AI systems"
group-objective: >
  To ensure that interested parties of AI systems are informed about the
  AI system's capabilities, limitations, and intended use.
applicable: true
justification: >
  Applicable. AI-related incidents (bias detection, hallucination with
  business impact, model compromise, unauthorized data processing, prohibited
  practice detection) must be communicated to affected stakeholders. The AI
  Policy defines violation response (Section 5) and the incident response
  framework covers AI-specific incident types. Stakeholder communication
  includes internal team, customers (for Product AI), and regulators.
implementation-status: partially-implemented
implementation-approach: >
  AI incident communication follows the established incident response
  framework extended for AI-specific events. Internal communication: AI
  incidents are flagged to CEO and CISO Agent immediately; Weekly Technical
  meeting reviews ongoing incidents. Customer communication: Product AI
  incidents affecting customer data or decisions trigger customer notification
  per DPA terms. Regulatory communication: NIS2 timelines apply to AI
  cybersecurity incidents; EU AI Act serious incident reporting applies to
  High-Risk systems. The AI Policy Section 5 defines immediate suspension
  and investigation for prohibited practice violations. Communication
  templates for each stakeholder group are in development.
