---
control-id: A.6.2.8
control-name: "AI system recording of event logs"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. All AI system interactions produce auditable records. Claude
  Code agent sessions are captured in Git commit history with attribution.
  Third-party tool usage is governed by acceptable use policies with usage
  tracking. Product AI requires inference logging for audit, debugging, and
  compliance traceability. EU AI Act Art. 12 requires automatic logging for
  High-Risk systems.
implementation-status: partially-implemented
implementation-approach: >
  Event logging approaches vary by system category: Development AI (agents)
  produce Git commits with agent attribution for every artifact, creating
  an immutable audit log of all AI-generated content. PR review records
  capture human validation decisions. Third-party tool usage is logged
  via organizational policy; detailed API logging available for Azure
  OpenAI Service. Product AI event logging is designed for inference
  requests/responses, user interactions, model version tracking, and
  error events. Log retention follows the 7-year minimum per data retention
  policy. EU AI Act Art. 12 logging requirements are addressed for future
  High-Risk classifications.
evidence-references:
