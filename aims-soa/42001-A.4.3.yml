    description: "AI System Registry with data-inputs/outputs per system"
    path: "ai-registry/"
  - document-id: HH-AIMS-POL-001
    description: "AI Policy Section 4 (Data Governance)"
    path: "policies/AI-Policy.md"
iso27001-mapping:
