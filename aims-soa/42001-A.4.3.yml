---
control-id: A.4.3
control-name: "Data resources"
group: A.4
group-name: "Resources for AI systems"
group-objective: >
  To ensure that the organization accounts for the resources (including AI
  system components and assets) of the AI system in order to fully understand
  and address risks and impacts.
applicable: true
justification: >
  Applicable. Each AI system in the registry has documented data-inputs and
  data-outputs with classification levels. For Development AI (Claude Code
  agents), data resources include compliance documents, ISO standards, and
  code repositories. For Product AI (Verity VE/EAM), data resources include
  customer project data and historical benchmarks. Data classification per
  the 4-level scheme (Public, Internal, Confidential, Secret) is applied.
implementation-status: partially-implemented
implementation-approach: >
  Data resources are documented per AI system in the AI System Registry
  entries (data-inputs and data-outputs fields with classification level).
  The AI Policy Section 4 (Principle 4: Data Governance and Privacy by Design)
  establishes data handling requirements. For Development AI agents, data
  inputs are constrained to Internal and Confidential classification. For
  Product AI, customer data handling is governed by DPAs. Full data lineage
  documentation for Product AI training data is planned for Growth phase.
evidence-references:
