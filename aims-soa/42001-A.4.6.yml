control-id: A.4.6
control-name: "Human resources"
group: A.4
group-name: "Resources for AI systems"
group-objective: >
  To ensure that the organization accounts for the resources (including AI
  system components and assets) of the AI system in order to fully understand
  and address risks and impacts.
applicable: true
justification: >
  Applicable. The Helge Heupel Group has 6 human team members with defined
  AI governance responsibilities. CEO, CTO, and CISO carry primary AI
  governance accountability. AI competence requirements are defined per role.
  EU AI Act Art. 4 mandates AI literacy for all personnel by August 2025,
  requiring documented AI literacy training.
implementation-status: partially-implemented
implementation-approach: >
  Human resources for AI governance are defined in the AI Policy Section 6
  (6 human roles with specific AI governance responsibilities) and the RACI
  matrix (32 SDLC activities mapped to 13 columns). AI competence
  requirements include: CEO/CISO must understand AI risk classification and
  EU AI Act obligations; CTO must understand AI architecture, model lifecycle,
  and performance metrics; IT Pentester must understand AI-specific security
  testing. EU AI Act Art. 4 AI literacy training program is in preparation
  for the August 2025 deadline.
