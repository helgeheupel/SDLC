---
control-id: A.5.2
control-name: "AI system impact assessment process"
group: A.5
group-name: "Assessing impacts of AI systems"
group-objective: >
  To identify and assess the potential consequences of AI systems on
  individuals, groups of individuals, and societies.
applicable: true
justification: >
  Applicable. The Helge Heupel Group operates 11 AI systems that interact
  with individuals (team members, customers). ISO 42001 cl. 6.1.4 mandates
  an impact assessment process. All current systems are classified as
  Limited-Risk under EU AI Act Art. 50 with transparency obligations.
  Product AI (Verity VE/EAM) directly impacts customer decision-making,
  requiring formal impact assessment before deployment.
implementation-status: partially-implemented
implementation-approach: >
  An AI impact assessment procedure following ISO 42005 structure is defined
  with 8 steps: scoping, responsibility assignment, threshold definition,
  execution, analysis, documentation, approval, and monitoring. The procedure
  specifies thresholds per impact dimension: fairness (disparate impact ratio
  >= 0.8), privacy (no special category data without DPIA), safety (no
  autonomous decisions without HITL), transparency (all AI outputs
  identifiable). For Limited-Risk systems, assessment focuses on transparency
  obligations and individual/societal impact.
