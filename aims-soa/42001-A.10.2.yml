---
control-id: A.10.2
control-name: "Allocating responsibilities"
group: A.10
group-name: "Third-party and customer relationships"
group-objective: >
  To ensure appropriate management of AI-related responsibilities in
  third-party and customer relationships.
applicable: true
justification: >
  Applicable. The Helge Heupel Group has third-party AI relationships with
  Anthropic (Claude Code agents), OpenAI (ChatGPT, Codex), and Microsoft
  (Azure OpenAI Service). Customer relationships for Product AI (Verity
  VE/EAM) include AI governance responsibilities. Responsibility allocation
  between HH and third parties must be documented per the EU AI Act value
  chain requirements (provider vs. deployer obligations).
implementation-status: partially-implemented
implementation-approach: >
  Responsibility allocation follows the EU AI Act value chain model: for
  third-party AI providers (Anthropic, OpenAI, Microsoft), HH is the
  deployer with transparency and monitoring obligations while providers
  carry GPAI model provider obligations. For Product AI customers, HH is
  the provider with conformity assessment, documentation, and monitoring
  obligations. Responsibility allocation is documented in: AI System
  Registry entries (provider field identifies the responsible party for
  the base AI system), supplier agreements (DPAs, terms of service), and
  customer contracts (AI feature terms, transparency obligations). Formal
  responsibility matrices per supplier/customer are in development.
