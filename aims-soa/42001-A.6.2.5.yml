---
control-id: A.6.2.5
control-name: "AI system deployment"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. Claude Code agents are deployed and operational (lifecycle-status:
  production). Third-party AI tools (ChatGPT, Codex) are deployed via vendor
  platforms. Verity product AI is in development with deployment planned. The
  AI Policy Section 7.4 defines deployment requirements: human approval at G4
  gate, CEO sign-off for Critical risk deployments, monitoring configuration,
  and rollback procedures.
implementation-status: partially-implemented
implementation-approach: >
  Deployment processes differ by AI system category: Development AI (agents)
  are deployed as Claude Code configurations in the Git repository with
  changes tracked via PR workflow. Third-party AI tools are deployed by
  their providers; HH manages access and acceptable use policies. Product
  AI follows the SDLC G4 (Release Readiness) gate with CI/CD pipeline
  deployment, environment separation (A.8.31), signed artifacts (Cosign),
  and monitoring configuration. The AI Policy prohibits AI deployment without
  human approval (prohibition #12). Rollback procedures are documented per
  system.
