---
control-id: A.8.3
control-name: "External reporting"
group: A.8
group-name: "Information for interested parties of AI systems"
group-objective: >
  To ensure that interested parties of AI systems are informed about the
  AI system's capabilities, limitations, and intended use.
applicable: true
justification: >
  Applicable. External reporting obligations exist for multiple regulatory
  frameworks: NIS2 requires reporting of significant AI-related cybersecurity
  incidents to BSI/NCSC-NL (24h initial, 72h detailed). EU AI Act requires
  reporting to market surveillance authorities for serious incidents involving
  High-Risk AI systems. TISAX assessments may require AI governance reporting.
  Additionally, customers may request AI governance transparency reports.
implementation-status: partially-implemented
implementation-approach: >
  External reporting processes are established through the incident response
  framework: NIS2 incident reporting timelines (24h/72h) cover AI-related
  cybersecurity events (model compromise, data poisoning, adversarial attack).
  EU AI Act serious incident reporting to market surveillance authorities is
  documented in procedures (to be activated when High-Risk systems are
  deployed). Customer transparency reporting provides AI governance posture
  summaries on request. TISAX assessment evidence includes AI governance
  documentation. The CISO Agent monitors regulatory reporting obligations
  and flags new requirements.
