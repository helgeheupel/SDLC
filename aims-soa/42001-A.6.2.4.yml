control-id: A.6.2.4
control-name: "AI system verification and validation"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. All AI systems undergo verification and validation: agents are
  validated through PR-based review of outputs against requirements; Product
  AI follows the SDLC testing framework (Semgrep SAST, OWASP ZAP DAST, bias
  testing, performance benchmarking). The AI Policy Section 7.3 defines
  testing requirements including bias testing with disparate impact ratio
  threshold (0.8) and adversarial robustness testing.
implementation-status: partially-implemented
implementation-approach: >
  V&V processes are defined at two levels: for Development AI (agents),
  verification is performed through PR review of agent outputs and
  periodic accuracy assessment by human domain experts. For Product AI,
  the SDLC-Growth-v2 testing framework applies: automated testing via
  CI/CD (Semgrep SAST, OWASP ZAP DAST, Dependabot SCA), AI-specific
  testing (bias testing across protected attributes, adversarial
  robustness testing, explainability validation), and acceptance testing
  at G4 gate. CycloneDX SBOM generation ensures supply chain verification.
  Full V&V execution for Product AI occurs as features reach testable state.
