---
control-id: A.7.2
control-name: "Data for development and enhancement of AI system"
group: A.7
group-name: "Data for AI systems"
group-objective: >
  To ensure appropriate data management practices for AI systems, including
  data collection, processing, and usage throughout the AI system life cycle.
applicable: true
justification: >
  Applicable. Development data varies by AI system category: Claude Code agents
  use compliance documents, ISO standards, and code repositories as context
  data (not training data, as Anthropic trains the base model). Product AI
  (Verity VE/EAM) uses customer project data, historical benchmarks, and
  industry datasets for model development and enhancement. Data quality
  and representativeness requirements are defined in AI Policy Principle 4.
implementation-status: partially-implemented
implementation-approach: >
  For Development AI (agents), context data (compliance documents, standards,
  code) is managed via Git with classification labels. Agents do not train
  models; they use pre-trained models with context-specific prompts. For
  Product AI, development data governance includes: data quality assessment
  before use, representativeness evaluation across target industries, consent
  verification for customer data (AI Policy prohibition #13), and DPA
  requirements. Data provenance tracking is documented in the AI System
  Registry data-inputs fields. Full data governance procedures for Product
  AI training data are being developed alongside model development.
