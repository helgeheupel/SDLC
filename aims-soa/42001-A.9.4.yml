    description: "AI System Registry (intended-use per system)"
    path: "ai-registry/"
  - document-id: HH-AIMS-POL-001
    description: "AI Policy Section 4 (classification) and Section 5 (restrictions)"
    path: "policies/AI-Policy.md"
