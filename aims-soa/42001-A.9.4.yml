---
control-id: A.9.4
control-name: "Intended use of the AI system"
group: A.9
group-name: "Use of AI systems"
group-objective: >
  To ensure that AI systems are used responsibly, taking into account the
  intended use and the potential impacts on individuals, groups, and societies.
applicable: true
justification: >
  Applicable. Every AI system in the registry has a documented intended-use
  field specifying authorized use cases, boundaries, and restrictions. The
  AI Policy dual-axis classification (Section 4) determines the appropriate
  use context. Prohibited practices (Section 5) define the hard boundaries
  of acceptable use. Use outside the documented intended purpose requires
  reassessment and CEO approval.
implementation-status: fully-implemented
implementation-approach: >
  Intended use is documented per AI system in the AI System Registry
  (intended-use field with specific authorized use cases). For agents:
  intended use aligns with their domain specification (CISO Agent for
  compliance, CTO Agent for architecture, AppSec Agent for security
  engineering). For Product AI: intended use covers authorized product
  features and customer segments. For third-party tools: intended use
  restricts to Internal-classified data and internal work products.
  Use outside documented intended purpose triggers the reclassification
  process per AI Policy Section 4. The SDLC-Growth-v2 framework
  enforces intended use boundaries through gate criteria and PR review.
evidence-references:
