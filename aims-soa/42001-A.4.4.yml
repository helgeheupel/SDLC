control-id: A.4.4
control-name: "Tooling resources"
group: A.4
group-name: "Resources for AI systems"
group-objective: >
  To ensure that the organization accounts for the resources (including AI
  system components and assets) of the AI system in order to fully understand
  and address risks and impacts.
applicable: true
justification: >
  Applicable. The Helge Heupel Group uses specific tooling for AI system
  development and operation: Claude Code CLI for agent execution, Azure
  OpenAI Service for product AI inference, GitHub for version control and
  CI/CD, Semgrep for SAST, OWASP ZAP for DAST, and CycloneDX for SBOM
  generation. Tooling is documented in the CTO Agent domain context and
  security engineering specifications.
implementation-status: fully-implemented
implementation-approach: >
  AI tooling resources are documented in two locations: the CTO Agent domain
  context (agents/cto/reference/domain-context.md) lists the complete
  technology stack including AI-specific tools, and the AI System Registry
  entries reference the operational-context (CLI, API, web interface) for
  each system. The approved AI toolchain is defined in AI Policy Section 5.2
  (prohibition #14): Claude Code, ChatGPT, Codex, Azure OpenAI Service.
  New tools require assessment and CEO approval before use.
