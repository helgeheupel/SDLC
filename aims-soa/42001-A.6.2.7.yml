---
control-id: A.6.2.7
control-name: "AI system technical documentation"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. Technical documentation is maintained for all AI systems:
  agent specifications (300-400 lines each), reference materials, domain
  context documents, and threat models. Product AI requires additional
  documentation per EU AI Act (Annex IV for High-Risk systems, Art. 50
  transparency information for Limited-Risk systems). The AI System Registry
  serves as the index to all technical documentation per system.
implementation-status: partially-implemented
implementation-approach: >
  Technical documentation is produced and maintained per AI system category:
  Development AI (agents) have prompt specifications, domain context documents,
  reference materials, and threat models (TM-CLAUDE-001). Product AI
  technical documentation includes architecture design, API specifications,
  model performance characteristics, and transparency information per
  ISO 12792. The AI System Registry entry links to all technical documents
  per system. Git-based document control ensures version tracking and
  approval history. EU AI Act Annex IV documentation framework is prepared
  for Product AI systems that may require High-Risk classification.
evidence-references:
