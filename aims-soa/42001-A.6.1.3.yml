---
control-id: A.6.1.3
control-name: "Processes for responsible AI system design and development"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. The SDLC-Growth-v2 framework (Startup overlay) defines the
  development process for all AI systems. The framework includes responsible
  AI design principles: bias assessment before training, privacy by design,
  security by design per ISO 27001 A.8.25, transparency information
  production per ISO 12792, and human oversight gates. Agent development
  follows the agent framework specification with trust level governance.
implementation-status: partially-implemented
implementation-approach: >
  AI design and development processes are governed by the SDLC-Growth-v2
  framework with the Startup Companion overlay. For Product AI (Verity
  VE/EAM): requirements specification (G1), architecture design (G2),
  development with security controls (G3), and release readiness (G4)
  include AI-specific criteria. For Development AI (agents): the agent
  framework specification defines prompt engineering, reference material
  management, trust level governance, and cross-agent coordination. The
  AI Policy Section 7 defines lifecycle requirements covering design,
  development, testing, deployment, monitoring, and retirement.
