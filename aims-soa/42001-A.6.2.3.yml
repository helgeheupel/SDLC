---
control-id: A.6.2.3
control-name: "Documentation of AI system design and development"
group: A.6
group-name: "AI system life cycle"
group-objective: >
  To define and manage the AI system life cycle, including design,
  development, deployment, operation, monitoring, and retirement.
applicable: true
justification: >
  Applicable. All AI systems have design documentation: agents have prompt
  specifications, reference materials, and domain context documents; Product
  AI has architecture decision records (ADRs) and technical design documents.
  Git history provides a complete, timestamped record of all design and
  development decisions. The CTO Agent is responsible for architecture
  documentation and ADR production.
implementation-status: partially-implemented
implementation-approach: >
  AI system design documentation follows established patterns: agent design
  is documented in agent prompt files (agents/*/AGENT.md, 300-400 lines
  each), reference materials (agents/*/reference/), and domain context
  documents. Product AI design uses ADRs managed by the CTO Agent in the
  ADR registry. The Git repository provides immutable history of all design
  changes. Technical documentation includes system architecture, component
  interactions, data flow diagrams, and API specifications. Product AI
  technical design documentation is in active development alongside the
  Verity AI features.
