---
control-id: A.4.5
control-name: "System and computing resources"
group: A.4
group-name: "Resources for AI systems"
group-objective: >
  To ensure that the organization accounts for the resources (including AI
  system components and assets) of the AI system in order to fully understand
  and address risks and impacts.
applicable: true
justification: >
  Applicable. AI systems rely on external computing resources: Anthropic API
  for Claude Code agent execution, Azure OpenAI Service for Verity product AI
  inference, Azure compute (West Europe, Germany West Central) for hosting.
  The cloud-only model means HH does not operate physical AI compute
  infrastructure, but must document provider capabilities, SLAs, and
  capacity planning.
implementation-status: partially-implemented
implementation-approach: >
  Computing resources for AI systems are documented in registry entries
  (operational-context field) and the CTO Agent domain context (infrastructure
  section). Anthropic API provides compute for the 7 Claude Code agents with
  usage tracking. Azure OpenAI Service provides inference compute for Verity
  product AI with configurable throughput. Capacity planning and cost
  monitoring are tracked via Azure Cost Management and Anthropic usage
  dashboards. Formal compute resource planning documentation is being
  developed alongside product AI deployment.
