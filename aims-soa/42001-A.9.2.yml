---
control-id: A.9.2
control-name: "Processes for responsible use of AI systems"
group: A.9
group-name: "Use of AI systems"
group-objective: >
  To ensure that AI systems are used responsibly, taking into account the
  intended use and the potential impacts on individuals, groups, and societies.
applicable: true
justification: >
  Applicable. The AI Policy establishes 8 governance principles for responsible
  AI use, and the SDLC-Growth-v2 framework operationalizes these principles
  through gate criteria and human oversight requirements. All AI system
  usage by team members and agents is governed by acceptable use policies
  (AI Policy Section 5) and prohibited practices (Section 5.1 and 5.2).
  The PR-based workflow ensures all AI outputs are reviewed before use.
implementation-status: fully-implemented
implementation-approach: >
  Responsible use processes are implemented through multiple mechanisms: the
  AI Policy Principles 1-8 define the governance framework; the RACI matrix
  assigns responsible use oversight to specific roles; the SDLC gates (G1-G5)
  enforce responsible use checkpoints for Product AI; the PR review workflow
  ensures agent outputs are validated by humans before acceptance; the AI
  Policy prohibitions (Section 5) define hard boundaries; and the Monthly
  Strategic meeting reviews AI governance metrics. For third-party AI tools,
  acceptable use guidelines restrict data classification levels and require
  output review before incorporation into work products.
