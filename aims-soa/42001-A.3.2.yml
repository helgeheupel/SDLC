control-name: "AI roles and responsibilities"
group: A.3
group-name: "Internal organization"
group-objective: >
  To establish a framework for the implementation and operation of the AI
  management system within the organization.
applicable: true
justification: >
  Applicable. The Helge Heupel Group has defined AI governance roles for all
  6 human personnel and 7 AI agents in the RACI-Startup matrix
  (HH-RACI-Startup-v1.0). The AI Policy Section 6 specifies AI governance
  responsibilities per role. The accountable human (A in RACI) is always a
  human; AI agents can be Responsible or Consulted but never Accountable.
implementation-status: fully-implemented
implementation-approach: >
  AI roles and responsibilities are documented in two complementary artifacts:
  the AI Policy Section 6 (HH-AIMS-POL-001) defines per-role AI governance
  responsibilities for 6 human roles and 7 AI agent roles, and the RACI
  matrix (RACI-Startup.md) maps 32 SDLC activities to 13 columns (6 humans
  + 7 agents). The governance model (HH-GOV-Startup-v1.0) defines the
  two-meeting structure for AI governance review. CEO is ultimately
  accountable for all AI governance across the three entities.
