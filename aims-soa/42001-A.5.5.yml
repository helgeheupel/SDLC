---
control-id: A.5.5
control-name: "Assessing societal impacts of AI systems"
group: A.5
group-name: "Assessing impacts of AI systems"
group-objective: >
  To identify and assess the potential consequences of AI systems on
  individuals, groups of individuals, and societies.
applicable: true
justification: >
  Applicable. Verity product AI serves enterprise customers in construction
  and architecture industries where AI-generated cost predictions and value
  engineering recommendations can influence procurement decisions, employment
  levels, and resource allocation at scale. The AI Policy Principle 7
  (Environmental Sustainability) addresses environmental societal impact.
  Societal impact assessment is proportionate to the AI system's reach.
implementation-status: planned
implementation-approach: >
  Societal impact assessment is embedded in the AI Impact Assessment Procedure
  as specific dimensions: economic impact (effect on labor and employment in
  target industries), environmental impact (compute energy consumption per
  AI Policy Principle 7), market concentration (competitive effects of AI
  recommendations), and democratic/social cohesion impacts. For Product AI,
  societal assessment considers downstream effects of cost optimization
  recommendations on supplier ecosystems. For Development AI, societal
  impact is assessed as low given internal use only. Assessment results
  feed into the AIMS management review agenda.
