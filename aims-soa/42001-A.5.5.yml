    relationship: "No direct ISO 27001 equivalent. Societal impact assessment for AI systems is entirely outside ISO 27001 scope. This is a unique AIMS requirement driven by ISO 42001 cl. 6.1.4 and the EU AI Act's emphasis on fundamental rights assessment."
