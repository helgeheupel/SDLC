---
control-id: A.7.6
control-name: "Data preparation"
group: A.7
group-name: "Data for AI systems"
group-objective: >
  To ensure appropriate data management practices for AI systems, including
  data collection, processing, and usage throughout the AI system life cycle.
applicable: true
justification: >
  Applicable but with different scope per system category. For Development AI
  (agents), HH does not prepare training data as Anthropic handles base model
  training; however, context data preparation (document formatting, reference
  material curation) constitutes data preparation. For Product AI (Verity
  VE/EAM), data preparation includes cleaning, normalization, feature
  engineering, train/test splitting, and augmentation. These activities
  directly affect model quality and fairness.
implementation-status: planned
implementation-approach: >
  Data preparation processes are defined per system category: for Development
  AI agents, context data preparation involves curating reference materials,
  formatting domain context documents, and structuring prompt templates. This
  is managed through the agent framework and Git-based document control. For
  Product AI, data preparation processes are being established as part of the
  ML pipeline development: data cleaning standards, normalization procedures,
  feature engineering documentation, train/test/validation split ratios, and
  bias-aware sampling strategies. Data preparation scripts are version-controlled
  and reproducible. Documentation of preparation steps enables audit
  verification of data handling.
