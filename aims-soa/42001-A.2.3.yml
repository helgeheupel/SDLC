control-name: "Alignment with other organizational policies"
group: A.2
group-name: "Policies related to AI"
group-objective: >
  To provide management direction and support for AI, in accordance with
  business requirements, relevant laws, regulations, and contracts.
applicable: true
justification: >
  Applicable. The AI Policy (HH-AIMS-POL-001) is explicitly aligned with the
  Information Security Policy (HH-ISMS-POL-001) and the IMS Context
  (HH-IMS-CTX-001) through the Integrated Management System architecture.
  Cross-references between policies are documented in each policy's "Related
  Documents" section. Shared controls (access control, incident management,
  document control) are implemented once and referenced by both policies.
implementation-status: fully-implemented
implementation-approach: >
  The IMS Context document (HH-IMS-CTX-001) establishes the relationship
  between IS Policy and AI Policy at Tier 1 of the document hierarchy. The
  AI Policy Section 1 explicitly references the IS Policy and IMS Context.
  The AI Policy Annex aligns operational procedures with IS Policy Annex
  procedures. Shared controls use a single implementation referenced by
  both Annex A SoAs (ISO 27001 and ISO 42001). Annual policy review
  includes alignment verification across both policies.
