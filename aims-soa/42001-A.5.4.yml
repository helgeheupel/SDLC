    relationship: "No direct ISO 27001 equivalent. Individual impact assessment for AI systems addresses fairness, autonomy, and discrimination dimensions that are outside ISO 27001 scope. The GDPR DPIA process (referenced by ISO 27001 A.5.34) provides partial overlap for privacy impacts only."
