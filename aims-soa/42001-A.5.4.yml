    path: "procedures/ai-impact-assessment-procedure.md"
  - document-id: HH-AIMS-POL-001
    description: "AI Policy Principle 6 (Fairness and Non-Discrimination)"
    path: "policies/AI-Policy.md"
iso27001-mapping:
