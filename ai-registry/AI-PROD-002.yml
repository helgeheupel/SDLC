---
system-id: AI-PROD-002
name: "Verity EAM AI"
category: product-ai
description: >
  AI capabilities within the Verity Enterprise Architecture Management (EAM)
  product. Customer-facing AI features that provide architecture analysis,
  technology landscape assessment, and transformation planning recommendations
  for enterprise customers. Patent-pending technology [PATENT-EAM-001]. This
  is a product AI system under full ISO 42001 governance because it directly
  informs customer technology decisions.
provider: Helge Heupel GmbH
model: Multiple (Azure OpenAI Service backbone)
intended-use: >
  Decision support for enterprise architecture management. Generates technology
  landscape assessments, architecture maturity evaluations, transformation
  roadmap suggestions, and technology rationalization recommendations. All
  AI outputs require human enterprise architect review before customer
  decision-making. Supports but does not replace human architectural judgment.
operational-context: >
  Deployed within the Verity EAM SaaS platform on Azure (West Europe, Germany
  West Central). Customer data processed within Azure tenant boundaries.
  Customer-facing AI features marked with "AI-assisted" indicators per
  EU AI Act Art. 50. Multi-tenant architecture with strict data isolation.
  LINDDUN threat modeling applicable due to GDPR-scoped personal data
  processing in architecture stakeholder mapping features.
eu-ai-act-classification: limited-risk
eu-ai-act-rationale: >
  Currently classified as Limited-Risk under EU AI Act Art. 50 (system
  interacts with humans and generates content). Architecture management
  functions are not listed in Annex III, but assessment pending for features
  involving personnel-related architecture decisions (workforce planning
  in IT transformation could trigger Art. 6 classification). Full analysis
  to be completed when product features are finalized.
sdlc-usage-tier: tier-3-decision-support
human-oversight: >
  Tier 3 (Human-in-the-Loop Mandatory). All AI-generated architecture
  recommendations require human enterprise architect review before customer
  presentation. AI outputs include confidence scores and alternative options.
  Customers are informed that outputs are AI-assisted. Architecture
  classifications affecting workforce decisions require additional review
  layer per EU AI Act considerations.
data-inputs:
  - type: customer-architecture-data
    classification: confidential
    description: "Customer IT landscape inventories, application portfolios, technology stacks"
  - type: architecture-frameworks
    classification: internal
    description: "TOGAF, ArchiMate reference models for architecture assessment baselines"
  - type: stakeholder-data
    classification: confidential
    description: "Architecture stakeholder maps, responsibility assignments (may contain personal data)"
  - type: model-parameters
    classification: confidential
    description: "Trained model weights, feature configurations, inference parameters"
data-outputs:
  - type: architecture-assessments
    classification: confidential
    description: "AI-generated technology landscape analyses and maturity evaluations"
  - type: transformation-plans
    classification: confidential
    description: "Architecture transformation roadmaps with prioritization recommendations"
  - type: rationalization-reports
    classification: confidential
    description: "Technology rationalization suggestions with cost-benefit analysis"
  - type: transparency-artifacts
    classification: internal
    description: "Model cards, capability documentation, known limitations per ISO/IEC 12792"
transparency-information: >
  Product UI displays "AI-assisted" labels on all AI-generated content per
  EU AI Act Art. 50. Architecture recommendations include confidence scores
  and methodology explanations. Customer documentation per ISO/IEC 12792
  transparency taxonomy. Stakeholder impact analysis disclaims AI involvement.
  Users can request explanations for AI-assisted outputs.
