system-id: AI-AGENT-005
name: "Platform/SRE Agent"
category: development-ai
description: >
  Platform engineering and Site Reliability Engineering agent for the Helge
  Heupel Group. Specializes in SLO frameworks, observability pipeline design,
  incident management procedures, infrastructure monitoring, and Azure platform
  operations. Ensures AI system operational reliability and drift detection.
provider: Anthropic
model: Claude Code (Claude Opus)
intended-use: >
  Infrastructure and operational reliability support. Designs SLO frameworks
  for Verity products and internal systems, configures observability pipelines
  (logging, metrics, tracing), defines incident management procedures, monitors
  AI model drift detection infrastructure, and produces platform engineering
  artifacts. Supports ISO 42001 A.6.2.6 (AI system operation and monitoring)
  requirements.
operational-context: >
  Deployed as a Claude Code agent accessed via CLI. Reads infrastructure
  configurations (Terraform/Bicep), monitoring dashboards, SLO definitions,
  and incident reports. Produces operational runbooks, SLO specifications,
  alerting configurations, and platform architecture documents. Works with CTO
  Agent on infrastructure decisions and AppSec Agent on security monitoring.
eu-ai-act-classification: limited-risk
eu-ai-act-rationale: >
  Classified as Limited-Risk under EU AI Act Art. 50 (transparency obligations).
  The agent interacts with users and generates operational content. Transparency
  obligation fulfilled through Git commit attribution and document metadata.
sdlc-usage-tier: tier-2-collaborator
human-oversight: >
  Trust Level 2 (Supervised Autonomous). Infrastructure changes require IT
  Pentester/Super Admin review before execution. SLO targets require CTO
  approval. Incident response procedures require CISO review for security-
  relevant incidents. No infrastructure modifications are executed autonomously.
