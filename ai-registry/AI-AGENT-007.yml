---
system-id: AI-AGENT-007
name: "AppSec Agent"
category: development-ai
description: >
  Head of Product Security Engineering agent for the Helge Heupel Group.
  Specializes in threat modeling (STRIDE/LINDDUN), SAST/DAST configuration,
  SBOM generation, supply chain security (SLSA/Sigstore), dependency scanning,
  and security testing pipeline integration. Operational arm of the CISO Agent,
  executing security policies through technical security artifacts.
provider: Anthropic
model: Claude Code (Claude Opus)
intended-use: >
  Security engineering artifact production and pipeline integration. Produces
  threat models for each system (STRIDE for all, LINDDUN for GDPR-scoped
  products), configures Semgrep CE SAST rules, designs OWASP ZAP DAST scans,
  generates CycloneDX SBOMs, implements SLSA Level 2 provenance with
  Sigstore/Cosign, and manages Dependabot dependency scanning configuration.
  Consumes CISO policies as constraints, does not modify them.
operational-context: >
  Deployed as a Claude Code agent accessed via CLI. Reads source code, dependency
  manifests, threat model YAML files, vulnerability reports, and SAST/DAST scan
  results. Produces threat model YAML files, SAST configuration (.semgrepignore,
  policy files), DAST scan profiles, SBOM documents, and supply chain security
  specifications. Agent system prompt at agents/appsec/CLAUDE.md (304 lines).
eu-ai-act-classification: limited-risk
eu-ai-act-rationale: >
  Classified as Limited-Risk under EU AI Act Art. 50 (transparency obligations).
  The agent interacts with users and generates security analysis content.
  Transparency obligation fulfilled through Git commit attribution and document
  metadata.
sdlc-usage-tier: tier-2-collaborator
human-oversight: >
  Trust Level 2 (Supervised Autonomous). Threat model findings require CTO
  review for architecture impact. SAST/DAST configuration changes require
  CTO approval. Vulnerability remediation SLAs (Critical 48h, High 7d,
  Medium 30d) enforced by human reviewers. False positive management through
  centralized semgrepignore and policy file reviewed by CTO and CISO.
data-inputs:
  - type: source-code
    classification: confidential
    description: "Application source code (TypeScript/JavaScript) for security analysis"
  - type: dependency-manifests
    classification: internal
    description: "package.json, pnpm-lock.yaml for dependency scanning and SBOM generation"
  - type: vulnerability-reports
    classification: confidential
    description: "Dependabot alerts, SAST/DAST scan results, CVE advisories"
  - type: threat-models
    classification: confidential
    description: "Existing STRIDE/LINDDUN threat model YAML files for review and update"
  - type: security-policies
    classification: internal
    description: "IS Policy, AI Policy, AppSec configuration baselines from CISO Agent"
data-outputs:
  - type: threat-models
    classification: confidential
    description: "STRIDE/LINDDUN threat model YAML files with threats, mitigations, and control references"
  - type: sast-configuration
    classification: internal
    description: "Semgrep CE rules, .semgrepignore, false positive management policy"
  - type: sbom-documents
    classification: internal
    description: "CycloneDX SBOMs with dependency inventory, license analysis, vulnerability status"
  - type: supply-chain-specs
    classification: internal
    description: "SLSA Level 2 provenance configurations, Sigstore/Cosign signing workflows"
transparency-information: >
  All AppSec Agent outputs carry Git commit attribution. Threat models document
  the methodology (STRIDE/LINDDUN) and AI involvement in threat identification.
  SAST/DAST configurations include rationale for rule selection and suppression
  decisions. SBOM documents are generated deterministically from lockfiles.
lifecycle-status: production
deployment-entities:
  - GmbH
  - B.V.
responsible-owner: "CISO role"
