---
system-id: AI-AGENT-001
name: "CISO Agent"
category: development-ai
description: >
  Chief Information Security Officer agent for the Helge Heupel Group. Produces
  compliance artifacts, risk assessments, policy documents, and audit evidence
  across ISO 27001, ISO 42001, TISAX, NIS2, and EU AI Act frameworks. Operates
  within the SDLC-Growth-v2 framework at Trust Level 2 (Supervised Autonomous).
  Combines expertise from 5 source archetypes: EU Compliance Architect, AI
  Governance Officer, US Compliance Architect (advisory), Cross-Framework
  Compliance Integrator, and Risk Management Architect.
provider: Anthropic
model: Claude Code (Claude Opus)
intended-use: >
  Decision support and artifact generation for information security policy,
  ISMS/AIMS management, risk assessment, EU compliance (NIS2, GDPR, TISAX),
  AI governance (ISO 42001), and cross-framework compliance integration. The
  CISO Agent drafts risk register entries, SoA determinations, scope statements,
  and governance documents. Outputs require human validation before acceptance.
operational-context: >
  Deployed as a Claude Code agent accessed via CLI. Operates on the HH Group
  compliance repository (SDLC monorepo). Produces Markdown and YAML artifacts
  committed to Git. CEO Helge Heupel and human CISO (NorthGRC) review all
  outputs via PR workflow. Agent system prompt at agents/ciso/CLAUDE.md (383
  lines) with progressive disclosure via reference/ directory.
eu-ai-act-classification: limited-risk
eu-ai-act-rationale: >
  Classified as Limited-Risk under EU AI Act Art. 50 (transparency obligations).
  The agent interacts with users and generates content that could be perceived
  as human-generated. Transparency obligation: all outputs are clearly identified
  as AI-generated via the SDLC workflow (Git commit attribution, YAML frontmatter
  author field, PR descriptions).
sdlc-usage-tier: tier-2-collaborator
human-oversight: >
  Trust Level 2 (Supervised Autonomous). All outputs require human review before
  acceptance. CEO approves via PR merge. Human CISO (NorthGRC) validates risk
  assessments in workshop sessions. No output reaches production, customers, or
  external stakeholders without human approval. Promotion to Trust Level 3
  requires 30+ interactions with demonstrated accuracy plus CEO approval.
data-inputs:
  - type: compliance-documents
    classification: internal
    description: "ISMS/AIMS policies, scope statements, risk register, SoA files, governance model"
  - type: iso-standards
    classification: confidential
    description: "Licensed ISO standard PDFs (27001, 42001, 23894, 42005) for compliance interpretation"
  - type: regulatory-texts
    classification: public
    description: "EU AI Act, NIS2 directive, GDPR, TISAX ISA requirements for regulatory mapping"
  - type: gap-analyses
    classification: internal
    description: "Phase 1/2 gap analysis documents, SDLC-Growth-v2 companion document"
  - type: risk-register
    classification: confidential
    description: "36 pre-seeded risks across 7 categories in risks/*.yml files"
data-outputs:
  - type: policy-documents
    classification: internal
    description: "IS Policy, AI Policy, scope statements, procedures, governance documents"
  - type: risk-assessments
    classification: confidential
    description: "Risk register entries, risk methodology, treatment plans, residual risk acceptance records"
  - type: compliance-mappings
    classification: internal
    description: "SoA entries, ISO 42001 Annex A control mappings, cross-framework traceability"
  - type: audit-evidence
    classification: confidential
    description: "Workshop materials, evidence packages, management review inputs"
transparency-information: >
  All CISO Agent outputs carry Git commit attribution identifying the author as
  the CISO Agent. YAML frontmatter in every document includes author: CISO Agent.
  PR descriptions state that content is AI-generated. Stakeholders can identify
  AI-generated content through Git history and document metadata. The agent
  identity is documented in agents/ciso/CLAUDE.md.
lifecycle-status: production
