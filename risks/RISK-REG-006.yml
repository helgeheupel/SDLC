risk-id: RISK-REG-006
title: "Multi-jurisdictional regulatory conflict between DE/NL/US data protection requirements"
description: >
  Conflicting data protection requirements across the three jurisdictions where
  the HH Group operates (Germany -- BDSG/NIS2UmsuCG, Netherlands -- AVG/Wbni,
  United States -- state-level privacy laws) create compliance conflicts that
  cannot be simultaneously satisfied. Examples include: data localization
  requirements conflicting with cross-border data flows, varying data breach
  notification timelines (24h NIS2 vs. 72h GDPR vs. varying US state laws),
  or conflicting retention requirements. The EU-US Data Privacy Framework
  provides a transfer mechanism but may face legal challenges similar to
  Schrems I and Schrems II.
