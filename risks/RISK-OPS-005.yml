rationale: >
  Climate change is an emerging risk driver recognized by ISO 27001:2022/Amd 1:2024.
  European heatwaves and flooding events have increased in frequency and severity,
  with potential impacts on datacenter cooling capacity, power grid stability, and
  remote worker availability. Rated Unlikely (2) because Azure datacenters have
  robust environmental controls and the distributed nature of the remote team
  reduces single-point-of-failure exposure. Impact is Moderate (3) because a
  simultaneous multi-day disruption to both cloud services and multiple team members
  would degrade operations but would not be existential given the cloud-native
  architecture. Treatment through multi-region deployment, BCP planning for climate
  scenarios, and remote working flexibility reduces likelihood to Rare (1); impact
  remains Moderate (3) as extended climate events could still affect regional
  infrastructure.
