risk-id: RISK-OPS-005
title: "Climate-related disruption to cloud services or remote workforce availability"
description: >
  Extreme weather events (flooding, heatwaves, storms) or climate-related
  infrastructure stress disrupt either the Azure cloud datacenters in West Europe
  and Germany West Central regions or the remote working capability of the HH
  Group's 6-person distributed team. Climate-related events can cause power grid
  instability affecting datacenter operations, internet infrastructure damage
  impacting remote worker connectivity, or physical displacement of team members.
  This risk addresses the ISO 27001:2022/Amd 1:2024 requirement to consider
  climate change in the ISMS risk assessment.
