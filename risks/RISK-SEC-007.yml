rationale: >
  MFA bypass techniques have become increasingly sophisticated, with adversary-in-
  the-middle (AitM) proxy attacks and MFA fatigue attacks being actively exploited
  in the wild. The HH Group relies heavily on Entra ID MFA as the primary defense
  for cloud resource access, making MFA bypass a critical threat vector. Rated
  Possible (3) because AitM toolkits (EvilGinx2, Modlishka) are widely available
  and MFA fatigue attacks require minimal sophistication. Impact is Major (4)
  because successful MFA bypass grants the same access as the compromised user,
  potentially including administrative access to Azure production environments and
  all 3 entities' resources. FIDO2 hardware keys for privileged accounts eliminate
  the AitM attack surface entirely for those accounts, reducing likelihood to
  Unlikely (2); impact remains Major (4) because non-privileged accounts using
  standard MFA remain theoretically vulnerable.
