---
risk-id: RISK-SEC-007
title: "MFA bypass or authentication weakness exploitation"
description: >
  An attacker exploits weaknesses in the HH Group's multi-factor authentication
  implementation to gain unauthorized access to Azure, M365, or Git resources.
  Attack vectors include adversary-in-the-middle (AitM) proxy attacks that
  capture session tokens after MFA completion, SIM swapping to intercept SMS-based
  MFA codes, MFA fatigue attacks bombarding users with push notifications, or
  exploitation of legacy authentication protocols that bypass Conditional Access
  policies. The CEO's account is a particularly high-value target given the
  broad access rights across all 3 entities and all systems.
