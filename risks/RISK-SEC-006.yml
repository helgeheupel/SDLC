---
risk-id: RISK-SEC-006
title: "Insufficient logging preventing incident detection and forensics"
description: >
  Inadequate or misconfigured logging across the HH Group's technology stack
  (Azure, M365, Git, Vercel, Cloudflare, Neon) prevents timely detection of
  security incidents or renders post-incident forensics insufficient for root
  cause analysis and regulatory reporting. NIS2UmsuCG and GDPR both require
  the ability to detect and report security incidents within strict timelines
  (24h initial notification, 72h detailed report under NIS2; 72h notification
  under GDPR). Without comprehensive logging, these reporting obligations
  cannot be met.
