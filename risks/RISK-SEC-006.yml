rationale: >
  Logging gaps are a frequent finding in ISO 27001 audits and a critical weakness
  for NIS2 incident reporting compliance. The HH Group's distributed technology
  stack spans multiple platforms (Azure, M365, Git, Vercel, Cloudflare, Neon)
  each with independent logging capabilities that may not be centrally aggregated
  or monitored. Rated Possible (3) because logging configuration is often
  incomplete during rapid startup growth, and log retention policies may not
  cover the full investigation timeline needed for forensics. Impact is Major (4)
  because insufficient logging could result in failure to detect breaches within
  NIS2 reporting timelines, leading to regulatory penalties under NIS2UmsuCG
  Sec. 38 (management body personal liability). Centralized logging, defined
  monitoring rules, and evidence collection procedures reduce likelihood to
  Unlikely (2) and impact to Moderate (3) by ensuring detection capability
  and forensic readiness.
