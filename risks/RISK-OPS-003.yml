rationale: >
  Data loss from backup failure is a low-frequency but catastrophic-impact event.
  The HH Group uses managed database services (Neon PostgreSQL) and cloud storage
  (Azure Blob) which provide built-in redundancy, but silent corruption and
  accidental deletion remain risks if backup verification is not regularly tested.
  Rated Unlikely (2) because managed cloud services provide automatic backups by
  default. Impact is Severe/Existential (5) because permanent loss of customer data
  or compliance artifacts would trigger GDPR breach notifications, potential
  regulatory investigation, and loss of enterprise customer trust. Treatment through
  geo-redundant storage, automated backups, and quarterly restoration testing reduces
  likelihood to Rare (1); impact remains Severe (5) because the consequences of
  actual data loss are inherent to the business.
