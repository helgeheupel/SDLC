risk-id: RISK-OPS-003
title: "Data loss due to backup failure or corruption in Azure SQL and Blob Storage"
description: >
  Critical business data stored in Neon (PostgreSQL) databases, Azure Blob Storage,
  or Git repositories is lost due to backup failure, silent corruption, or
  accidental deletion without adequate recovery capability. The HH Group stores
  customer data, compliance artifacts, risk register entries, and AI model
  configurations across these systems. At Startup phase, backup verification
  procedures may not be fully tested, creating a gap between assumed and actual
  recoverability.
