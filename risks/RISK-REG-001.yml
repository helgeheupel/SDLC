rationale: >
  NIS2UmsuCG entered into force on December 5, 2025, making compliance immediately
  mandatory. The regulation's personal liability provisions for management bodies
  (Sec. 38) make this an existential risk for CEO Helge Heupel personally. The HH
  Group operates under NIS2 in two jurisdictions (DE via NIS2UmsuCG, NL via Wbni),
  doubling the regulatory exposure. Rated Possible (3) because NIS2 is newly in
  force and compliance programs are still being established across the industry; BSI
  enforcement activities are expected to intensify throughout 2026. Impact is
  Severe/Existential (5) because enforcement fines, mandatory corrective measures,
  and personal CEO liability could be existential for a startup. BSI registration,
  incident reporting procedures, management body training, and NIS2 readiness
  assessments reduce likelihood to Unlikely (2) and impact to Major (4) by
  demonstrating proactive compliance efforts.
