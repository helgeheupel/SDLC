---
risk-id: RISK-REG-001
title: "NIS2 non-compliance leading to enforcement action and management body liability"
description: >
  The Helge Heupel GmbH fails to meet NIS2UmsuCG requirements, leading to
  enforcement action by the BSI (Bundesamt fuer Sicherheit in der
  Informationstechnik). NIS2UmsuCG Section 38 establishes personal liability for
  management bodies (Geschaeftsfuehrer) who fail to ensure cybersecurity risk
  management measures. Additionally, Helge Heupel B.V. is subject to the Dutch
  Wbni (Wet beveiliging netwerk- en informatiesystemen) with NCSC-NL oversight.
  Non-compliance could result in administrative fines up to EUR 10 million or
  2% of global turnover (whichever is higher), mandatory corrective measures,
  and personal liability for CEO Helge Heupel as Geschaeftsfuehrer of the GmbH.
