risk-id: RISK-SUP-004
title: "Open-source dependency vulnerability in Verity product supply chain"
description: >
  A critical vulnerability is discovered in an open-source dependency used by the
  Verity VE or Verity EAM products (TypeScript/Node.js ecosystem: Qwik, Payload
  CMS, React, Next.js, and their transitive dependencies). The npm ecosystem has
  experienced multiple high-profile supply chain attacks (event-stream, ua-parser-
  js, colors.js), and the HH Group's product stack includes hundreds of transitive
  dependencies. A compromised dependency could introduce backdoors, data
  exfiltration, or denial of service into Verity products affecting enterprise
  customers.
