rationale: >
  The npm/Node.js ecosystem has a high rate of supply chain vulnerabilities due
  to the large number of transitive dependencies in typical projects. The Verity
  products use TypeScript with Qwik, Payload CMS, and Next.js, each bringing
  significant dependency trees. Rated Likely (4) because vulnerabilities in npm
  packages are discovered weekly and supply chain attacks on the Node.js ecosystem
  are well-documented. Impact is Major (4) because a compromised dependency
  deployed to production could affect enterprise customer data and trigger
  NIS2 incident reporting obligations. Dependency lockfiles, automated scanning,
  SBOM generation, and documented update processes reduce likelihood to Possible
  (3) and impact to Moderate (3); the residual risk remains Medium because the
  npm ecosystem's attack surface is inherently broad.
