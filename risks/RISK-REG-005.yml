rationale: >
  The TISAX scope has changed dramatically since the original 2022 certification.
  Two certified locations are closed, the business address has changed, the business
  model has pivoted from automotive consulting to AI software products, and ISA 5.1
  must be upgraded to ISA 6. The TUeV SueD renewal inquiry (December 30, 2025)
  remains unanswered, creating urgency with the March 2026 label expiration. Rated
  Likely (4) because the scope changes are extensive and the compressed timeline
  makes complete remediation before expiration challenging. Impact is Major (4)
  because TISAX certification is required by automotive enterprise customers; loss
  of the label would affect existing customer relationships and new business
  development. ISA 6 self-assessment, scope redefinition, and TUeV SueD engagement
  reduce likelihood to Possible (3) and impact to Moderate (3) by demonstrating
  proactive scope management. Monthly review cycle due to approaching deadline.
