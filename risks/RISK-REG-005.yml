title: "TISAX scope change assessment reveals gaps requiring remediation before renewal"
description: >
  The TISAX scope change assessment required for the HH Group's certification
  renewal (label expiring March 16, 2026) reveals significant gaps between the
  previous TISAX scope (ISA 5.1, two physical locations, automotive project focus)
  and the current organizational reality (ISA 6, single Berlin location, AI
  software products, cloud-only infrastructure). The scope has fundamentally
  changed: old addresses are closed (WeWork Kurfuerstendamm 11, Wolfsburg
  locations), new address (Kurfuerstendamm 194) is not certified, business model
  has shifted from automotive consulting to AI product development, and ISA 5.1
  must be upgraded to ISA 6. TUeV SueD renewal inquiry (from Carsten Diercks,
  December 30, 2025) remains unanswered as of February 2026.
