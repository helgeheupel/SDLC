rationale: >
  Secret exposure in Git repositories is one of the most common security incidents
  in software development, with GitHub reporting millions of leaked secrets annually.
  The HH Group uses multiple external APIs (Anthropic, OpenAI, Neon, Vercel,
  Cloudflare) and Azure service principals, each requiring secrets that could be
  inadvertently committed. Rated Likely (4) because the development workflow
  involves frequent configuration changes and multiple developers handling secrets
  across different deployment targets. Impact is Major (4) because exposed API keys
  could grant access to production databases (Neon), AI services (Claude/OpenAI),
  or deployment platforms (Vercel/Cloudflare). Pre-commit secret scanning hooks,
  Azure Key Vault for centralized secrets management, and automated scanning
  alerts reduce likelihood to Unlikely (2) and impact to Moderate (3) by enabling
  rapid detection and rotation of exposed secrets.
