---
risk-id: RISK-SEC-005
title: "API key or secret exposure in Git repository or CI/CD logs"
description: >
  An API key, database connection string, Azure service principal credential,
  Anthropic API key, or other secret is accidentally committed to a Git repository
  or exposed in CI/CD pipeline logs (GitHub Actions). The HH Group's development
  workflow uses multiple API integrations (Anthropic Claude, OpenAI, Neon PostgreSQL,
  Vercel, Cloudflare, Azure) each requiring secrets management. A single exposed
  secret could grant unauthorized access to production services, AI APIs, or
  customer databases.
