risk-id: RISK-SEC-004
title: "Malware infection on remote worker endpoint device"
description: >
  A malware infection (ransomware, info-stealer, remote access trojan) compromises
  a laptop used by an HH Group team member working remotely. The fully remote
  working model means all 6 team members operate from home networks without
  corporate network perimeter controls. An infected endpoint could exfiltrate
  credentials, encrypt local data, establish persistence for lateral movement to
  Azure cloud resources, or be used as a staging point for supply chain attacks
  against Verity product customers.
