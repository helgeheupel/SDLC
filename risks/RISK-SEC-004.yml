rationale: >
  Malware targeting remote workers has increased significantly since the shift
  to remote work, with info-stealers and ransomware being the most prevalent
  threats. The HH Group's fully remote model exposes endpoints to home network
  risks without corporate firewall protection. Rated Possible (3) based on
  industry data showing malware encounters are common for technology workers
  browsing, downloading tools, and working from shared networks. Impact is
  Moderate (3) because Entra ID Conditional Access and MFA requirements create
  a barrier between endpoint compromise and cloud resource access, limiting
  lateral movement. EDR with centralized monitoring, mandatory disk encryption,
  and web filtering reduce likelihood to Unlikely (2); impact remains Moderate (3)
  as defense-in-depth controls contain the blast radius of an endpoint infection.
