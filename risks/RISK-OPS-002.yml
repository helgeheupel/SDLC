rationale: >
  CI/CD pipeline attacks have increased significantly since the SolarWinds and
  Codecov incidents, with GitHub Actions being a common attack surface. The HH
  Group's pipeline handles deployments across multiple platforms (Vercel, Cloudflare
  Pages) with access to production secrets. Rated Possible (3) because pipeline
  compromise via dependency confusion or malicious GitHub Actions is a recognized
  threat for TypeScript/Node.js projects. Impact is Major (4) because compromised
  deployments could inject malicious code into customer-facing Verity products.
  Treatment through mandatory PR reviews, environment separation, and scoped
  tokens reduces both likelihood to Unlikely (2) and impact to Moderate (3), as
  PR reviews catch most malicious changes before they reach production.
