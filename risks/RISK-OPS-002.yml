---
risk-id: RISK-OPS-002
title: "CI/CD pipeline compromise or failure affecting deployment integrity"
description: >
  The GitHub Actions CI/CD pipeline used for Verity VE and Verity EAM deployments
  is compromised through supply chain attack, misconfiguration, or dependency
  poisoning, leading to deployment of malicious or untested code to production.
  Alternatively, pipeline failure during a critical deployment window prevents
  timely security patches or feature releases. The HH Group's deployment pipeline
  handles all production deployments for Vercel (helgeheupel-cms, verity-cms) and
  Cloudflare Pages (verity-website), making it a high-value target.
