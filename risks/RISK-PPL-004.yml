rationale: >
  The intersection of cloud security and AI governance is a relatively new domain
  with limited available expertise. ISO 42001 was published in December 2023 and
  auditor expectations are still forming. The HH Group's dual certification target
  (ISO 27001 + ISO 42001) requires competencies that few individuals possess.
  Rated Possible (3) because the AI governance domain is new and the team may lack
  depth in specific areas. Impact is Moderate (3) because the CISO Agent provides
  expert-level guidance that supplements human expertise, and external CISO support
  from NorthGRC provides additional coverage. Targeted training, professional
  community engagement, and authority contacts reduce likelihood to Unlikely (2)
  and impact to Minor (2) by building in-house capability and external support
  networks.
