risk-id: RISK-PPL-004
title: "Skill gap in cloud security or AI governance competencies"
description: >
  The HH Group team lacks sufficient expertise in cloud security (Azure security
  architecture, identity management, network security) or AI governance (ISO 42001
  implementation, AI risk assessment, EU AI Act compliance) to adequately implement
  and maintain the ISMS/AIMS. The IT Pentester/Super Admin handles platform security
  but may lack formal cloud security certification. The human CISO may have limited
  ISO 42001 experience given the standard's novelty (published December 2023).
  Skill gaps could lead to misconfigured security controls, inadequate risk
  assessments, or audit nonconformities.
