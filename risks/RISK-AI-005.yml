rationale: >
  AI bias in classification systems is a well-documented risk that has led to
  significant regulatory and reputational consequences across industries. The
  Verity EAM product [PATENT-EAM-001] performs classifications that enterprise
  customers use for resource allocation and strategic planning, making bias a
  direct fairness concern. Rated Possible (3) because bias can emerge from
  training data, feature selection, or algorithmic design and may not be apparent
  during development. Impact is Major (4) because biased classifications affecting
  enterprise customers could trigger EU AI Act scrutiny and erode trust in the
  product. Impact on individuals and society: biased classifications could
  systematically disadvantage employees, departments, or business units,
  affecting career progression, resource access, and professional evaluation
  fairness per ISO 42001 cl. 6.1.2(d)(1). Bias testing, fairness metrics,
  and independent audits reduce likelihood to Unlikely (2) and impact to
  Moderate (3).
