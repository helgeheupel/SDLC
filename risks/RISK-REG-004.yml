risk-id: RISK-REG-004
title: "ISO 27001/42001 certification failure at Stage 1 or Stage 2 audit"
description: >
  The HH Group fails to achieve ISO 27001:2022 and/or ISO 42001:2023
  certification during Stage 1 (documentation review) or Stage 2 (implementation
  audit). Failure could result from incomplete ISMS/AIMS documentation, inadequate
  evidence of control implementation, insufficient management review evidence,
  or inability to demonstrate continuous improvement. The dual certification
  target (ISO 27001 + ISO 42001) increases complexity and the risk of
  nonconformity findings. ISO 42001 auditor expectations are poorly documented
  given the standard's novelty (published December 2023).
