rationale: >
  ISO 27001 certification has a structured audit process with well-documented
  expectations, but ISO 42001 is a new standard with limited auditor experience.
  The dual certification target increases the documentation burden and the
  probability of at least one nonconformity finding. Rated Possible (3) because
  the 12-week timeline is ambitious for dual certification and ISO 42001 auditor
  expectations are still forming. Impact is Major (4) because certification
  failure would delay enterprise customer engagement (many require ISO 27001),
  undermine the TISAX renewal timeline, and require costly remediation. Internal
  audit programs, readiness assessments, and systematic clause coverage reduce
  likelihood to Unlikely (2) and impact to Moderate (3) by identifying gaps
  before the certification body does.
