rationale: >
  Azure production environment access is the highest-value target for both external
  attackers and insider threats. RBAC misconfiguration and overly permissive service
  principals are among the top cloud security findings across industry. Rated
  Possible (3) because cloud environment misconfiguration is a frequent occurrence
  in startups with rapid infrastructure changes. Impact is Severe/Existential (5)
  because unauthorized production access could lead to customer data breach,
  regulatory investigation under GDPR/NIS2, TISAX certification loss, and
  destruction of enterprise customer trust. PIM with JIT elevation, mandatory MFA,
  and quarterly access reviews reduce likelihood to Unlikely (2); impact remains
  Severe (5) because the consequences of actual unauthorized access are inherent
  to the data classification of production assets.
