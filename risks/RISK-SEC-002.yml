---
risk-id: RISK-SEC-002
title: "Unauthorized access to Azure production environment via RBAC/PIM bypass"
description: >
  An external attacker or malicious insider gains unauthorized access to the
  Azure production subscription hosting Verity VE and Verity EAM by exploiting
  misconfigured Role-Based Access Control (RBAC) policies, Privileged Identity
  Management (PIM) weaknesses, or stale service principal credentials. The HH
  Group's Azure environment contains customer data, AI model configurations,
  application source code deployments, and compliance infrastructure. A
  compromised production environment could lead to data exfiltration, service
  manipulation, or supply chain compromise of Verity products.
category: SEC
ai-risk: false
