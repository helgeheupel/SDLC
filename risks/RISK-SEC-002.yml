treatment-strategy: modify
treatment-controls:
  - control-id: A.5.15
    description: "Azure RBAC with least-privilege principle enforced across all subscriptions and resource groups"
  - control-id: A.8.2
    description: "Privileged Identity Management (PIM) with time-limited just-in-time elevation for administrative access"
  - control-id: A.8.5
    description: "MFA enforced via Entra ID Conditional Access for all Azure management plane operations"
  - control-id: A.8.15
    description: "Azure activity log monitoring with alerts for privileged operations and anomalous access patterns"
  - control-id: A.5.18
    description: "Quarterly access rights review for all Azure production environment permissions"
