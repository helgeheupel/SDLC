risk-id: RISK-SUP-003
title: "Critical SaaS vendor discontinuation or data breach affecting HH operations"
description: >
  A critical SaaS vendor used by the HH Group (NorthGRC for GRC management,
  Linear for task management, Float for resource planning) discontinues service,
  experiences a significant data breach, or becomes unavailable. These vendors
  hold HH Group operational data including compliance status, project tasks,
  and resource allocation information. A vendor data breach could expose
  internal operational details, while service discontinuation would require
  migration to alternative tools during the certification timeline.
