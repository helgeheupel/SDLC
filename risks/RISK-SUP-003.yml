rationale: >
  SaaS vendor risk is manageable for the HH Group because none of these vendors
  hold customer data or classification-sensitive information (those are in Azure/
  Neon under direct HH control). NorthGRC, Linear, and Float hold operational and
  project management data classified as Internal. Rated Unlikely (2) because
  established SaaS vendors typically provide advance notice of discontinuation
  and maintain reasonable security practices. Impact is Moderate (3) because
  vendor disruption would affect workflow efficiency but core data (customer data,
  source code, compliance artifacts) is stored independently in Azure/Git.
  Vendor security verification, data portability clauses, and periodic security
  reviews reduce likelihood to Rare (1) and impact to Minor (2).
