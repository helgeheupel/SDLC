rationale: >
  Azure regional outages occur multiple times per year across Microsoft's global
  infrastructure, though individual regions are affected less frequently. The HH
  Group's concentration on two Azure regions (West Europe and Germany West Central)
  creates single-provider dependency. Rated Possible (3) based on Azure's published
  availability history showing 2-4 significant regional incidents annually across
  all regions. Impact is Major (4) because an extended outage exceeding 2 days would
  breach enterprise SLA commitments and erode the customer trust that differentiates
  Verity products. Treatment through availability zones, geo-redundant storage, and
  documented failover procedures reduces likelihood to Unlikely (2); impact remains
  Major (4) because even with redundancy, a multi-zone Azure failure would still
  cause disruption.
