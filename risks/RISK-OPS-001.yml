---
risk-id: RISK-OPS-001
title: "Azure production environment outage disrupting Verity VE/EAM availability"
description: >
  An outage in the Microsoft Azure cloud platform (West Europe or Germany West
  Central regions) renders the Verity VE and Verity EAM products unavailable to
  enterprise customers. Given that all HH Group production workloads run
  exclusively on Azure with no secondary cloud provider, a regional outage would
  affect all customer-facing services simultaneously. At Startup phase, the
  6-person team has limited capacity to execute manual failover procedures under
  pressure, increasing mean time to recovery.
