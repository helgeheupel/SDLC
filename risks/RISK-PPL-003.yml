rationale: >
  Insider threats are statistically less frequent than external attacks but can
  cause disproportionate damage due to the insider's legitimate access rights.
  At a 6-person startup, broad access is necessary for operational efficiency,
  creating an inherent tension with least-privilege principles. Rated Unlikely (2)
  because the small, high-trust team has strong personal relationships and the
  CEO personally oversees all team members. Impact is Major (4) because
  exfiltration of patent-pending specifications ([PATENT-VE-001], [PATENT-EAM-001])
  or customer data could cause competitive damage and trigger GDPR/TISAX
  obligations. Confidentiality agreements, DLP controls, access reviews, and
  documented termination procedures reduce likelihood to Rare (1); impact remains
  Major (4) because the damage from successful insider exfiltration is inherent
  to the value of the information assets.
