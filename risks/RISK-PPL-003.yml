---
risk-id: RISK-PPL-003
title: "Insider threat from malicious or negligent data handling"
description: >
  A current or former HH Group team member intentionally or negligently
  exfiltrates, destroys, or mishandles sensitive information including customer
  data, patent-pending Verity VE/EAM specifications, or compliance artifacts.
  The 6-person team structure means each individual has broad access rights
  across systems (Azure, M365, Git repositories) with limited segregation of
  duties. Negligent handling (e.g., forwarding Confidential documents to
  personal email, storing Secret data on unencrypted personal devices) is more
  likely than malicious exfiltration at Startup phase but both scenarios must
  be addressed.
