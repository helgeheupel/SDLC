risk-id: RISK-AI-007
title: "Anthropic/OpenAI API dependency causing service disruption or capability loss"
description: >
  The HH Group's critical dependency on Anthropic (Claude Code for 7 SDLC agents)
  and OpenAI (ChatGPT, Codex) APIs creates a supply chain risk where service
  disruption, terms of service changes, pricing increases, or capability removal
  could affect both internal SDLC operations and Verity product AI capabilities.
  Anthropic is the sole provider for the Claude Code agent system that drives the
  entire SDLC compliance process; a sustained API outage or policy change
  prohibiting specific use cases could halt compliance artifact production and
  degrade Verity product functionality simultaneously.
