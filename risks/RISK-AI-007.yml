rationale: >
  Single-provider AI API dependency is a significant supply chain risk for
  organizations building core capabilities on third-party AI platforms. Anthropic's
  Claude Code is the foundation for all 7 SDLC agents, and both Anthropic and
  OpenAI have experienced service disruptions in the past. Rated Possible (3)
  because API outages, pricing changes, and terms of service modifications are
  recurring events in the AI industry. Impact is Major (4) because a sustained
  disruption would simultaneously affect SDLC compliance operations (all 7 agents)
  and Verity product capabilities, creating a dual operational and product impact.
  Impact on individuals: customers relying on Verity VE/EAM would experience
  degraded service during an API disruption, affecting their ability to make
  timely decisions. Multi-provider readiness, contractual SLAs, and documented
  fallback procedures reduce likelihood to Unlikely (2) and impact to Moderate (3).
