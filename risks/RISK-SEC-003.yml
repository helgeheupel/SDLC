rationale: >
  Data breaches from classification failures are among the most common information
  security incidents in organizations transitioning to formal classification schemes.
  The HH Group handles patent-sensitive materials (Verity VE [PATENT-VE-001], Verity
  EAM [PATENT-EAM-001]), customer data across 3 jurisdictions, and compliance
  artifacts at Confidential classification. Rated Possible (3) because the
  classification scheme is newly implemented and team members are adapting to
  consistent labeling requirements. Impact is Severe/Existential (5) because
  exposure of patent-pending specifications or customer data could trigger GDPR
  breach notifications, TISAX certification issues, and competitive damage.
  DLP policies, Azure Information Protection, and mandatory labeling procedures
  reduce likelihood to Unlikely (2) and impact to Major (4) by preventing the
  most egregious classification failures while accepting that human error in
  labeling will occasionally occur.
