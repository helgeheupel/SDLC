---
risk-id: RISK-SEC-003
title: "Data breach exposing confidential or secret information due to classification failure"
description: >
  Confidential or Secret information (patent-pending Verity VE/EAM specifications,
  customer data, cryptographic keys, M&A documents) is inadvertently exposed due
  to incorrect classification, misconfigured sharing permissions in M365/SharePoint,
  or accidental publication in a public Git repository. The HH Group's 4-level
  classification scheme (Public, Internal, Confidential, Secret) requires consistent
  application across all documents, emails, and collaboration tools. A classification
  failure in a 6-person team where individuals handle multiple classification levels
  daily is a realistic scenario.
