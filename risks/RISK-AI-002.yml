rationale: >
  Prompt injection is the most significant security risk for LLM-based applications,
  with OWASP ranking it as the top LLM vulnerability. The HH Group's use of 7
  Claude Code agents with repository access creates multiple attack surfaces for
  indirect prompt injection. Rated Possible (3) because prompt injection techniques
  are evolving rapidly and complete prevention is not yet achievable. Impact is
  Major (4) because a compromised agent could modify security-critical artifacts,
  exfiltrate Confidential/Secret information, or inject vulnerabilities into Verity
  products. Impact on individuals: a compromised CISO Agent producing flawed risk
  assessments could lead to inadequate security controls that fail to protect
  customer data, affecting individuals relying on Verity products. Mandatory PR
  review, scoped agent permissions, and sandboxed execution reduce likelihood to
  Unlikely (2) and impact to Moderate (3).
