---
risk-id: RISK-AI-002
title: "Prompt injection attack on Claude Code agents executing in SDLC pipeline"
description: >
  An attacker exploits prompt injection vulnerabilities in the 7 Claude Code AI
  agents that operate within the HH Group's SDLC pipeline. Attack vectors include
  malicious content embedded in Git repository files that agents read during
  execution, crafted issue descriptions or PR comments that manipulate agent
  behavior, or indirect prompt injection through third-party data sources. A
  successful injection could cause agents to exfiltrate sensitive information,
  modify security controls, bypass review requirements, or produce deliberately
  flawed compliance artifacts.
