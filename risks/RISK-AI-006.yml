rationale: >
  AI model drift is an expected phenomenon for systems relying on external LLM
  APIs where the provider may update models without notice. Both Anthropic and
  OpenAI have historically changed model behavior through updates, potentially
  affecting downstream product quality. Rated Possible (3) because API providers
  routinely update models and input data distributions evolve naturally. Impact is
  Moderate (3) because drift typically causes gradual quality degradation rather
  than sudden failure, and customers may tolerate minor quality fluctuations before
  reporting issues. Impact on individuals: degraded AI output quality could lead
  to systematically misleading recommendations affecting users' professional
  decisions, though the impact is correctable once detected. Performance monitoring,
  regression testing, and model version tracking reduce likelihood to Unlikely (2)
  and impact to Minor (2) by enabling early detection before customer impact.
