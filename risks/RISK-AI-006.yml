risk-id: RISK-AI-006
title: "AI model drift degrading Verity product quality without detection"
description: >
  The AI models underlying Verity VE [PATENT-VE-001] and Verity EAM
  [PATENT-EAM-001] experience performance degradation over time (model drift)
  due to changes in input data distributions, evolving business contexts, or
  upstream model updates from AI API providers (Anthropic, OpenAI). Without
  continuous monitoring, this degradation may go undetected until customers
  report quality issues or until an external audit identifies the gap, eroding
  the value proposition of Verity products.
