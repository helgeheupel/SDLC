risk-id: RISK-SUP-002
title: "Anthropic Claude API availability or policy change affecting SDLC agents"
description: >
  Anthropic restricts, suspends, or significantly changes the Claude API service
  that powers all 7 Claude Code AI agents in the HH Group's SDLC pipeline.
  Potential scenarios include: API rate limiting or quota reduction affecting
  agent throughput, terms of service changes prohibiting specific use cases
  (e.g., compliance artifact generation), model capability changes degrading
  agent output quality, or sustained API outages disrupting the entire SDLC
  compliance workflow. The HH Group has no alternative AI provider configured
  for the Claude Code agent system.
