rationale: >
  The HH Group's SDLC model is deeply integrated with Anthropic's Claude Code,
  making it a critical single-provider dependency. The AI API market is dynamic,
  with providers adjusting pricing, capabilities, and terms of service frequently.
  Anthropic has historically been stable but the company is relatively young and
  the API product is evolving rapidly. Rated Possible (3) because API changes and
  periodic outages are normal operational events for AI providers. Impact is Major
  (4) because the entire SDLC compliance workflow depends on Claude Code agents,
  and a sustained disruption would halt artifact production during the critical
  12-week certification timeline. Terms of service monitoring, availability
  tracking, manual workflow procedures, and migration path documentation reduce
  likelihood to Unlikely (2) and impact to Moderate (3).
