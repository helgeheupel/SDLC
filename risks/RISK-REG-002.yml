rationale: >
  GDPR enforcement by EU data protection authorities has intensified, with
  particular scrutiny on AI-related data processing. The HH Group processes data
  across 3 jurisdictions (DE, NL, US) with AI products that may involve personal
  data, creating multiple compliance touchpoints. Rated Possible (3) because GDPR
  compliance in the context of AI training data is a rapidly evolving area with
  regulatory guidance still developing. Impact is Major (4) because GDPR fines can
  reach EUR 20 million or 4% of global turnover, and a GDPR enforcement action
  would damage enterprise customer trust critical for Verity product adoption.
  Data processing registers, DPIA procedures, inter-entity transfer agreements,
  and retention schedules reduce likelihood to Unlikely (2) and impact to
  Moderate (3) by demonstrating structured compliance.
