risk-id: RISK-REG-002
title: "GDPR violation in AI training data handling or customer data processing"
description: >
  The HH Group violates GDPR (BDSG in Germany, AVG in Netherlands) through
  improper handling of personal data in AI training datasets, customer data
  processing for Verity VE/EAM, or cross-border data transfers between the
  3 legal entities without adequate legal basis. Specific risk scenarios include:
  using customer data to train AI models without explicit consent, failing to
  conduct required Data Protection Impact Assessments (DPIAs) for AI features
  processing personal data per GDPR Art. 35, or transferring personal data to
  Helge Heupel Inc. (US) without EU-US Data Privacy Framework compliance.
