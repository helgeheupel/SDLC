risk-id: RISK-REG-003
title: "EU AI Act non-compliance for Verity products regarding risk classification and conformity"
description: >
  Verity VE [PATENT-VE-001] and Verity EAM [PATENT-EAM-001] fail to comply with
  the EU AI Act (Regulation 2024/1689) requirements, including AI system risk
  classification, transparency obligations under Art. 52, or future conformity
  assessment requirements. Prohibited practices have been in force since February
  2, 2025, and full conformity obligations extend to August 2026. Incorrect risk
  classification (e.g., treating a high-risk system as limited-risk) could trigger
  enforcement action by national market surveillance authorities in Germany (BNetzA)
  or the Netherlands.
