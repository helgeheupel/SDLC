rationale: >
  The EU AI Act is the first comprehensive AI regulation globally, with enforcement
  timelines extending through 2026. The HH Group's Verity VE and EAM products are
  AI-powered systems operating in the EU market, making EU AI Act compliance
  mandatory. Current classification indicates Limited-Risk per Art. 52 (transparency
  obligations), but the regulatory landscape is evolving. Rated Possible (3)
  because the EU AI Act is new and interpretation of risk classification categories
  is still developing; incorrect classification is a realistic scenario. Impact is
  Major (4) because non-compliance could result in fines up to EUR 35 million or
  7% of global turnover, market access restrictions, and reputational damage that
  would undermine enterprise customer acquisition. Compliance roadmap, risk
  classification documentation, and authority engagement reduce likelihood to
  Unlikely (2) and impact to Moderate (3).
