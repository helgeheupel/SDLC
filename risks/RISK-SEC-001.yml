rationale: >
  Phishing is the most common initial access vector for cloud-hosted organizations.
  With 6 team members each having significant access to Azure, M365, and Git,
  a single compromised credential provides broad lateral movement opportunity.
  Rated Likely (4) based on industry frequency data showing targeted attacks on
  small technology companies occur at least monthly. Impact is Major (4) due to
  potential access to source code, customer data, compliance artifacts, and the
  risk of regulatory investigation under GDPR and NIS2. MFA with Conditional
  Access and FIDO2 hardware keys for privileged accounts reduces likelihood to
  Unlikely (2); impact remains Major (4) because MFA bypass techniques (adversary-
  in-the-middle, SIM swapping) continue to evolve.
