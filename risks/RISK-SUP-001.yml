---
risk-id: RISK-SUP-001
title: "Microsoft Azure service disruption or pricing change affecting all HH services"
description: >
  Microsoft Azure, the sole cloud infrastructure provider for all HH Group
  services, experiences a sustained service disruption or implements significant
  pricing changes that affect the economic viability of the HH Group's cloud
  architecture. All production workloads (Verity VE, Verity EAM), identity
  management (Entra ID), productivity tools (M365), and compliance infrastructure
  are hosted on Azure, creating a deep vendor dependency. A major Azure outage
  in the West Europe or Germany West Central regions would simultaneously affect
  all HH Group operations across all 3 entities.
