rationale: >
  Sole-provider cloud dependency is an accepted structural risk at Startup phase,
  documented in the IS Policy risk appetite statement. Azure's historical
  availability across European regions has been generally strong, but significant
  outages affecting entire regions have occurred. Pricing changes are more
  predictable but could affect the startup's cost structure significantly. Rated
  Possible (3) because Azure regional disruptions occur, and Microsoft has a
  history of adjusting pricing and deprecating services. Impact is Major (4)
  because all HH Group operations depend on Azure, and a sustained outage or
  major pricing increase would affect product delivery, customer commitments, and
  operational continuity simultaneously. Enterprise Agreement SLAs, service health
  monitoring, and multi-cloud readiness reduce likelihood to Unlikely (2) and
  impact to Moderate (3).
