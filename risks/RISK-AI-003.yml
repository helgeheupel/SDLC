rationale: >
  Review fatigue is a well-documented phenomenon in software development, and the
  HH Group's ambitious 12-week timeline creates pressure to approve artifacts
  quickly. The CEO reviewing hundreds of pages of agent-generated compliance
  content increases the risk of superficial review. Rated Likely (4) because the
  structural incentive to move quickly directly conflicts with thorough review
  requirements. Impact is Moderate (3) because most agent output errors would be
  caught during external audits and can be corrected, though the rework cost and
  timeline delay would be significant. Impact on individuals: rubber-stamped
  security controls could leave gaps in data protection that affect customers and
  employees. External CISO review, non-self-approving PR requirements, and periodic
  spot-checks reduce impact to Minor (2); likelihood remains Possible (3) because
  the time pressure incentive persists.
