risk-id: RISK-AI-003
title: "AI agent-generated artifacts accepted without adequate human review"
description: >
  Compliance artifacts, risk assessments, policy documents, or code changes
  generated by the 7 Claude Code AI agents are merged into the repository
  without sufficient human review, either due to review fatigue, time pressure
  from the 12-week certification timeline, or over-reliance on agent output
  quality. This "rubber-stamp" pattern creates a gap between the documented
  agent governance model (Trust Level 2: Supervised Autonomous) and actual
  practice, potentially producing artifacts that do not meet audit standards
  or contain errors that propagate through dependent documents.
