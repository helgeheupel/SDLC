rationale: >
  Large language models can produce plausible but incorrect compliance guidance,
  particularly for standards with nuanced requirements like ISO 42001 (published
  December 2023, limited training data). The CISO Agent operates at Trust Level 2
  (Supervised Autonomous) with all outputs requiring human validation, but the
  CEO's dual role as both validator and orchestrator creates a risk of rubber-stamp
  approval under time pressure. Rated Possible (3) because LLM hallucination on
  specific clause interpretations is a known limitation. Impact is Major (4) because
  audit nonconformities could delay the 12-week certification timeline and require
  costly rework. Impact on individuals: incorrect compliance advice could
  inadvertently weaken security controls protecting customer data, affecting
  individuals whose data is processed by Verity VE and EAM. Human review via PR,
  external CISO validation, and training on AI output verification reduce likelihood
  to Unlikely (2) and impact to Moderate (3).
