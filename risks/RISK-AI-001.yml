---
risk-id: RISK-AI-001
title: "CISO Agent produces incorrect compliance advice leading to audit nonconformity"
description: >
  The CISO Agent (Claude Code) generates incorrect or outdated compliance guidance
  that is accepted by the CEO and incorporated into ISMS/AIMS artifacts without
  adequate human review. This could lead to misinterpretation of ISO 27001/42001
  requirements, incorrect risk assessments, non-compliant policy content, or
  erroneous Statement of Applicability determinations. The consequence is audit
  nonconformity during ISO 27001 or ISO 42001 Stage 1/Stage 2 certification
  audits, potentially requiring significant rework and delaying the certification
  timeline.
