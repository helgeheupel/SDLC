risk-id: RISK-PPL-002
title: "Insufficient security awareness among team members"
description: >
  HH Group team members lack adequate security awareness regarding phishing
  recognition, information classification procedures, secure handling of
  credentials, and incident reporting obligations. At 6 team members, each
  individual handles sensitive information across multiple classification levels
  daily. The newly implemented 4-level classification scheme (Public, Internal,
  Confidential, Secret) and NIS2 incident reporting requirements (24h/72h
  timelines) require training that may not yet be fully embedded in daily
  workflows.
