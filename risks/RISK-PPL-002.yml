rationale: >
  Security awareness gaps are a consistent root cause of security incidents,
  particularly in organizations transitioning from informal to formal security
  governance. The HH Group has recently formalized its IS Policy, classification
  scheme, and AI Policy, creating a learning curve for team members. Rated
  Possible (3) because security awareness is a new formal requirement and team
  members may not yet have internalized the procedures. Impact is Moderate (3)
  because awareness gaps typically lead to minor policy violations rather than
  catastrophic breaches, and the small team size enables rapid informal
  correction. Annual training with quarterly reinforcement, clear reporting
  channels, and management accountability reduce likelihood to Unlikely (2) and
  impact to Minor (2) by embedding security awareness into daily workflows.
