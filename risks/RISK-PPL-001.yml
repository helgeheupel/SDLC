risk-id: RISK-PPL-001
title: "Key person dependency on CEO as single point of failure for multiple critical roles"
description: >
  CEO Helge Heupel currently serves as Managing Director (Geschaeftsfuehrer) of
  all 3 entities, interim CISO delegate, ultimate risk acceptance authority,
  policy approver, and primary orchestrator of the SDLC agent system. A prolonged
  absence (illness, incapacitation, or departure) would simultaneously affect
  executive leadership, security governance, compliance approvals, and the ability
  to steer AI agents. No deputy is formally designated for any of these roles.
  This concentration of authority is an accepted structural risk at Startup phase
  but represents the single highest impact people risk.
