rationale: >
  Key person dependency is a structural characteristic of a 6-person startup
  where the CEO covers multiple leadership roles simultaneously. The risk is
  well-understood and accepted at Startup phase per the governance model. Rated
  Unlikely (2) because prolonged CEO absence events are statistically infrequent
  in the short term, though the probability increases over multi-year horizons.
  Impact is Severe/Existential (5) because the CEO's absence would halt risk
  acceptance, policy approvals, investor communications, and strategic direction
  across all 3 entities simultaneously. Documentation of procedures, deputy
  designations, and AI agent capability to maintain operational continuity reduce
  the impact to Major (4) by enabling continued operations in a degraded mode;
  likelihood remains Unlikely (2) as the risk source is inherent.
