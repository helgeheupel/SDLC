risk-id: RISK-OPS-004
title: "Development environment compromise affecting code integrity"
description: >
  A developer workstation (laptop) used by one of the 6 HH Group team members is
  compromised, allowing an attacker to inject malicious code into Git repositories,
  steal API keys or credentials, or pivot to Azure production resources. Remote
  working arrangements mean developer endpoints operate outside traditional network
  perimeters, relying on endpoint security controls and identity-based access. The
  TypeScript/Qwik/Payload CMS development stack with numerous npm dependencies
  increases the attack surface through potential dependency confusion attacks.
