rationale: >
  Developer endpoint compromise is a well-documented attack vector, particularly
  for remote-first organizations where endpoints connect from untrusted networks.
  The HH Group's fully remote workforce operates without office network controls,
  relying on endpoint security and identity-based access. Rated Possible (3) based
  on industry frequency of endpoint compromises in technology companies. Impact is
  Moderate (3) because branch protection rules and PR review requirements create a
  second line of defense -- a compromised endpoint does not automatically translate
  to compromised production code. Treatment through MDM, EDR, signed commits, and
  remote working policies reduces likelihood to Unlikely (2); impact remains
  Moderate (3) as defense-in-depth limits blast radius.
